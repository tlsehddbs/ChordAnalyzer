name: macOS build

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Configure universal build
        run: cmake --preset macos-universal-release

      - name: Build app and tests
        run: cmake --build build/macos-universal-release --target ChordAnalyzer ChordAnalysisTests --parallel

      - name: Run analysis tests
        run: ctest --test-dir build/macos-universal-release --output-on-failure

      - name: Verify universal executable
        run: lipo -info 'build/macos-universal-release/ChordAnalyzer_artefacts/Release/Chord Analyzer.app/Contents/MacOS/Chord Analyzer'

      - name: Package application
        run: ditto -c -k --sequesterRsrc --keepParent 'build/macos-universal-release/ChordAnalyzer_artefacts/Release/Chord Analyzer.app' ChordAnalyzer-macOS-universal.zip

      - name: Upload macOS application
        uses: actions/upload-artifact@v4
        with:
          name: ChordAnalyzer-macOS-universal
          path: ChordAnalyzer-macOS-universal.zip
