name: Windows build

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    # The CMake preset requests the Visual Studio 2022 generator explicitly.
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake --preset windows-release

      - name: Build app and tests
        run: cmake --build build/windows-release --config Release --target ChordAnalyzer ChordAnalysisTests --parallel

      - name: Run analysis tests
        run: ctest --test-dir build/windows-release -C Release --output-on-failure

      - name: Package executable
        shell: pwsh
        run: |
          Compress-Archive -Path 'build/windows-release/ChordAnalyzer_artefacts/Release/Chord Analyzer.exe' -DestinationPath 'ChordAnalyzer-Windows-x64.zip'

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: ChordAnalyzer-Windows-x64
          path: ChordAnalyzer-Windows-x64.zip
